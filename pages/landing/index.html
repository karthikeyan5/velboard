<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #06060e;
      --card: #10101e;
      --card-border: rgba(201, 168, 76, 0.08);
      --accent: #c9a84c;
      --accent-dim: rgba(201, 168, 76, 0.12);
      --accent-glow: rgba(201, 168, 76, 0.25);
      --text: #e8e8f0;
      --text-dim: #6a6a7a;
      --text-mid: #9a9aaa;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-grid {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }
    .bg-glow {
      position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 60%);
      z-index: 0;
      animation: pulse 8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
    }

    .container {
      position: relative; z-index: 1;
      max-width: 420px; margin: 0 auto;
      padding: 60px 24px 40px;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh;
    }

    /* Agent avatar */
    .agent-avatar {
      width: 80px; height: 80px;
      background: var(--card);
      border: 2px solid var(--card-border);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .agent-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text);
    }
    .agent-role {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 4px;
    }
    .agent-quote {
      font-style: italic;
      color: var(--text-mid);
      font-size: 0.85rem;
      margin-top: 20px;
      max-width: 320px;
      text-align: center;
      line-height: 1.5;
    }
    .agent-traits {
      display: flex; gap: 8px; justify-content: center;
      margin-top: 16px; flex-wrap: wrap;
    }
    .trait {
      font-size: 0.7rem;
      padding: 4px 12px;
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 100px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .divider {
      width: 40px; height: 2px;
      background: var(--accent);
      opacity: 0.3;
      border-radius: 1px;
      margin: 28px auto;
    }

    /* Cards */
    .cards {
      width: 100%;
      display: flex; flex-direction: column; gap: 12px;
      margin-bottom: 32px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex; align-items: flex-start; gap: 14px;
    }
    .card-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
    .card-text {
      font-size: 0.82rem;
      color: var(--text-mid);
      line-height: 1.5;
    }
    .card-text strong { color: var(--text); }

    /* Login */
    .login-section {
      width: 100%;
      text-align: center;
      margin-bottom: 24px;
      min-height: 44px;
    }
    .tg-login-btn {
      color: var(--text-dim);
      font-size: 0.8rem;
    }
    .login-section.ready .tg-login-btn { display: none; }

    /* CTA */
    .cta-link {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 32px;
      background: linear-gradient(135deg, var(--accent), #d4b85a);
      color: #000;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      border-radius: 12px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px var(--accent-glow);
      margin-bottom: 32px;
    }
    .cta-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--accent-glow);
    }

    .footer {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-align: center;
      margin-top: auto;
      padding-top: 24px;
    }
    .footer a { color: var(--accent); text-decoration: none; }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 6px;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="container">
    <div class="agent-avatar" id="agent-emoji">🤖</div>
    <div class="agent-name" id="agent-name">Agent</div>
    <div class="agent-role" id="agent-role">AI Agent</div>
    <div class="agent-quote hidden" id="agent-quote"></div>
    <div class="agent-traits hidden" id="agent-traits"></div>

    <div class="divider"></div>

    <div class="cards" id="cards">
      <div class="card">
        <div class="card-icon">🧠</div>
        <div class="card-text"><strong>Always Thinking.</strong> Research, analysis, automation — running 24/7 so you don't have to.</div>
      </div>
      <div class="card">
        <div class="card-icon">📊</div>
        <div class="card-text"><strong>Live Dashboard.</strong> Sign in with Telegram to see system status, usage stats, and more.</div>
      </div>
    </div>

    <!-- Login -->
    <div class="login-section" id="tg-login-area">
      <div id="tg-login-placeholder" class="tg-login-btn">⏳ Loading Telegram Login...</div>
    </div>

    <!-- Telegram link -->
    <a class="cta-link hidden" id="tg-link" href="#">
      💬 <span id="tg-link-text">Open in Telegram</span>
    </a>

    <div class="footer">
      <span class="status-dot"></span> <span id="status-text">ONLINE</span>
      <br><br>
      <span id="company-name"></span>
      <br>
      powered by <a href="https://github.com/essdee/vel">vel</a>
    </div>
  </div>

  <script>
    // Session-based auth: if already authenticated, the dashboard will work via session cookie.

    // Auto-redirect Mini App users to dashboard
    if (window.Telegram?.WebApp?.initData) {
      window.location.href = '/dashboard';
    }

    // Dev mode: auto-login
    fetch('/api/mode').then(r => r.json()).then(m => {
      if (m.testMode) window.location.href = '/auth/dev';
    }).catch(() => {});

    // Load config and personalize
    fetch('/api/config').then(r => r.json()).then(cfg => {
      // Apply accent color
      const accent = cfg.accent || '#c9a84c';
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-dim', accent + '1a');
      document.documentElement.style.setProperty('--accent-glow', accent + '40');
      document.documentElement.style.setProperty('--card-border', accent + '14');

      // Agent info
      document.getElementById('agent-emoji').textContent = cfg.emoji || '🤖';
      document.getElementById('agent-name').textContent = cfg.name || 'Agent';
      document.getElementById('agent-role').textContent = cfg.role || 'AI Agent';
      document.title = `${cfg.name || 'Agent'} ${cfg.emoji || ''}`;

      if (cfg.quote) {
        const q = document.getElementById('agent-quote');
        q.textContent = `"${cfg.quote}"`;
        q.classList.remove('hidden');
      }
      if (cfg.traits && cfg.traits.length) {
        const t = document.getElementById('agent-traits');
        t.innerHTML = cfg.traits.map(t => `<span class="trait">${t}</span>`).join('');
        t.classList.remove('hidden');
      }

      // Custom cards from config
      if (cfg.cards && cfg.cards.length) {
        document.getElementById('cards').innerHTML = cfg.cards
          .map(c => `<div class="card"><div class="card-icon">${c.icon || '⚡'}</div><div class="card-text"><strong>${c.label}.</strong> ${c.text}</div></div>`)
          .join('');
      }

      // Company name
      if (cfg.company) {
        document.getElementById('company-name').textContent = cfg.company;
      }

      // Auth section — Telegram login or redirect to /login
      const loginArea = document.getElementById('tg-login-area');

      if (cfg.botUsername && cfg.authUrl) {
        // Telegram auth
        const script = document.createElement('script');
        script.async = true;
        script.src = 'https://telegram.org/js/telegram-widget.js?22';
        script.dataset.telegramLogin = cfg.botUsername;
        script.dataset.size = 'large';
        script.dataset.radius = '12';
        script.dataset.authUrl = cfg.authUrl;
        script.dataset.requestAccess = 'write';
        loginArea.appendChild(script);

        function reveal() { loginArea.classList.add('ready'); }
        const observer = new MutationObserver(() => {
          if (loginArea.querySelector('iframe')) { observer.disconnect(); reveal(); }
        });
        observer.observe(loginArea, { attributes: true, subtree: true, attributeFilter: ['style'] });
        window.addEventListener('message', function handler(e) {
          if (e.origin === 'https://oauth.telegram.org') { window.removeEventListener('message', handler); reveal(); }
        });
        setTimeout(reveal, 4000);
      } else {
        document.getElementById('tg-login-placeholder').textContent = '';
      }

      // Telegram link
      if (cfg.telegramLink) {
        const link = document.getElementById('tg-link');
        link.classList.remove('hidden');
        link.href = cfg.telegramLink;
        if (cfg.name) {
          document.getElementById('tg-link-text').textContent = `Talk to ${cfg.name} on Telegram`;
        }
      }
    }).catch(() => {
      document.getElementById('tg-login-placeholder').textContent = '';
    });

    // Enter key on any focused input triggers dashboard navigation
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') window.location.href = '/dashboard';
    });
  </script>
</body>
</html>
