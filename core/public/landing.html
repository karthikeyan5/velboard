<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #06060e;
      --card: #10101e;
      --card-border: rgba(201, 168, 76, 0.08);
      --accent: #c9a84c;
      --accent-dim: rgba(201, 168, 76, 0.12);
      --text: #e8e8f0;
      --text-dim: #6a6a7a;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    .bg-grid {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
    }
    .bg-glow-1 {
      position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 65%);
      z-index: 0;
    }
    .bg-glow-2 {
      position: fixed; bottom: -200px; right: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(201,168,76,0.04) 0%, transparent 70%);
      z-index: 0;
    }

    .container {
      position: relative; z-index: 1;
      max-width: 480px; margin: 0 auto; padding: 40px 24px;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh;
    }

    /* Avatar */
    .avatar-ring {
      width: 90px; height: 90px; border-radius: 24px;
      background: linear-gradient(135deg, var(--accent), rgba(201,168,76,0.3));
      padding: 2px; margin-bottom: 20px;
      animation: fadeDown 0.6s ease forwards;
    }
    .avatar-inner {
      width: 100%; height: 100%; border-radius: 22px;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 44px;
    }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-15px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }

    /* Name */
    .name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 36px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), #f0e4c0, var(--accent));
      background-size: 200% 200%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: fadeUp 0.5s ease 0.1s forwards, shimmer 4s ease infinite;
      opacity: 0;
    }
    @keyframes shimmer { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

    .role {
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-dim); margin-top: 6px; font-weight: 500;
      animation: fadeUp 0.5s ease 0.15s forwards; opacity: 0;
    }

    /* Divider */
    .divider {
      width: 40px; height: 2px; background: var(--accent);
      margin: 24px 0; border-radius: 1px;
      animation: fadeUp 0.5s ease 0.2s forwards; opacity: 0;
    }

    /* Quote */
    .quote {
      font-size: 15px; font-style: italic; color: var(--text-dim);
      text-align: center; line-height: 1.6; max-width: 340px;
      animation: fadeUp 0.5s ease 0.25s forwards; opacity: 0;
    }

    /* Cards */
    .cards { width: 100%; margin-top: 28px; display: flex; flex-direction: column; gap: 10px; }
    .card {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: 14px; padding: 16px 18px;
      animation: fadeUp 0.5s ease forwards; opacity: 0;
      transition: border-color 0.3s, transform 0.2s;
    }
    .card:hover { border-color: var(--accent-dim); transform: translateY(-1px); }
    .card:nth-child(1) { animation-delay: 0.3s; }
    .card:nth-child(2) { animation-delay: 0.35s; }
    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .card-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    .card-label { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
    .card p { font-size: 13px; color: var(--text-dim); line-height: 1.5; }

    /* Traits */
    .traits {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
      margin-top: 24px;
      animation: fadeUp 0.5s ease 0.4s forwards; opacity: 0;
    }
    .trait {
      font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
      padding: 5px 12px; border-radius: 20px;
      background: var(--accent-dim); color: var(--accent);
      border: 1px solid rgba(201,168,76,0.15);
    }

    /* Login */
    .login-section {
      margin-top: 32px; min-height: 48px; width: 100%;
      display: flex; flex-direction: column; align-items: center;
      animation: fadeUp 0.5s ease 0.45s forwards; opacity: 0;
    }
    .tg-login-btn {
      font-size: 13px; color: var(--text-dim); padding: 10px;
      transition: opacity 0.3s;
    }
    .login-section.ready .tg-login-btn { display: none; }

    /* CTA button */
    .cta-link {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 20px; padding: 12px 24px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #b8943a);
      color: #0a0a12; font-weight: 700; font-size: 14px;
      text-decoration: none; letter-spacing: 0.3px;
      transition: all 0.2s; box-shadow: 0 4px 20px rgba(201,168,76,0.25);
      animation: fadeUp 0.5s ease 0.5s forwards; opacity: 0;
    }
    .cta-link:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(201,168,76,0.35); }

    /* Status & footer */
    .status-line {
      margin-top: 24px; display: flex; align-items: center; gap: 6px;
      animation: fadeUp 0.5s ease 0.55s forwards; opacity: 0;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .status-text { font-size: 11px; color: #4ade80; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

    .footer {
      margin-top: auto; padding-top: 40px;
      font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px; text-align: center;
      animation: fadeUp 0.5s ease 0.6s forwards; opacity: 0;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <div class="container" id="main-container"></div>

  <script>
    // Auto-redirect Mini App users to dashboard
    if (window.Telegram?.WebApp?.initData) {
      window.location.href = '/dashboard';
    }

    // Dev mode: auto-login via /auth/dev
    fetch('/api/mode').then(r => r.json()).then(m => {
      if (m.testMode) window.location.href = '/auth/dev';
    }).catch(() => {});

    fetch('/api/config').then(r => r.json()).then(cfg => {
      const accent = cfg.accent || '#c9a84c';
      document.title = `${cfg.name} ${cfg.emoji || ''}`;
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-dim', accent + '1a');

      const cardsHtml = (cfg.cards || []).map(c => `
        <div class="card">
          <div class="card-header">
            <div class="card-icon" style="background:${accent}15;">${c.icon}</div>
            <div class="card-label" style="color:${accent};">${c.label}</div>
          </div>
          <p>${c.text}</p>
        </div>
      `).join('');

      const traitsHtml = (cfg.traits || []).map(t => `<span class="trait">${t}</span>`).join('');

      document.getElementById('main-container').innerHTML = `
        <div class="avatar-ring"><div class="avatar-inner">${cfg.emoji || '🤖'}</div></div>
        <div class="name">${cfg.name || 'Agent'}</div>
        <div class="role">${cfg.role || 'AI Agent'}</div>
        <div class="divider"></div>
        <div class="quote">"${cfg.quote || ''}"</div>
        <div class="cards">${cardsHtml}</div>
        <div class="traits">${traitsHtml}</div>
        <div class="login-section" id="tg-login-area">
          <div id="tg-login-placeholder" class="tg-login-btn">⏳ Loading Telegram Login...</div>
        </div>
        <a href="${cfg.telegramLink || '#'}" class="cta-link">💬 Talk to me on Telegram</a>
        <div class="status-line"><span class="status-dot"></span><span class="status-text">Online</span></div>
        <div class="footer">© ${new Date().getFullYear()} ${cfg.company || ''}. All rights reserved.</div>
      `;

      // Inject Telegram Login Widget
      const loginArea = document.getElementById('tg-login-area');
      const script = document.createElement('script');
      script.async = true;
      script.src = 'https://telegram.org/js/telegram-widget.js?22';
      script.dataset.telegramLogin = cfg.botUsername;
      script.dataset.size = 'large';
      script.dataset.authUrl = cfg.authUrl;
      script.dataset.requestAccess = 'write';
      loginArea.appendChild(script);

      function reveal() { loginArea.classList.add('ready'); }
      const observer = new MutationObserver((mutations) => {
        for (const m of mutations) {
          if (m.type === 'attributes' && m.attributeName === 'style' && m.target.tagName === 'IFRAME') {
            if (m.target.offsetWidth > 100) { observer.disconnect(); setTimeout(reveal, 300); return; }
          }
        }
      });
      observer.observe(loginArea, { attributes: true, subtree: true, attributeFilter: ['style'] });
      window.addEventListener('message', function handler(e) {
        if (e.origin === 'https://oauth.telegram.org') { window.removeEventListener('message', handler); reveal(); }
      });
      setTimeout(() => { observer.disconnect(); reveal(); }, 45000);

    }).catch(err => {
      document.getElementById('main-container').innerHTML =
        `<div style="color:#ef4444;padding:40px;">Failed to load: ${err.message}</div>`;
    });
  </script>
</body>
</html>
